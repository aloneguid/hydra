<html>
<head>
    <title>Hydra</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 20px auto; padding: 0 10px; }
        h1 { margin-bottom: 4px; }
        .status td { padding: 4px 12px 4px 0; }
        .status td:first-child { font-weight: bold; }
        .actions { display: flex; gap: 8px; flex-wrap: wrap; margin: 16px 0; }
        .control { margin: 20px 0; }
        .vkbd { overflow-x: auto; padding-bottom: 4px; }
        .kbd-row { display: flex; gap: 3px; margin-bottom: 3px; min-width: 580px; }
        .key { flex-shrink: 0; height: 40px; border: 1px solid #bbb; border-radius: 4px; background: #f5f5f5; cursor: pointer; font-size: 0.72em; display: flex; align-items: center; justify-content: center; touch-action: manipulation; -webkit-tap-highlight-color: transparent; white-space: nowrap; padding: 0 2px; }
        .key:hover { background: #e8e8e8; }
        .key:active, .key.flash { background: #c8d8ee; }
        .key.mod-active { background: #4a90d9; color: #fff; border-color: #2870b9; }
        .key-sp { background: none !important; border: none !important; pointer-events: none; }
        .mouse-wrap { overflow-x: auto; padding-bottom: 4px; }
        .mouse-inner { min-width: 580px; }
        .mouse-pad { width: 100%; height: 300px; background: #f0f0f0; border: 2px solid #bbb; border-radius: 8px; cursor: crosshair; touch-action: none; user-select: none; box-sizing: border-box; display: flex; align-items: center; justify-content: center; color: #ccc; font-size: 0.8em; }
        .mouse-pad.tracking { background: #e8eef5; border-color: #4a90d9; }
        .mouse-btns { display: flex; gap: 3px; margin-top: 3px; }
        .mouse-btn { flex: 1; height: 44px; border: 1px solid #bbb; border-radius: 4px; background: #f5f5f5; cursor: pointer; font-size: 0.85em; display: flex; align-items: center; justify-content: center; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
        .mouse-btn:hover { background: #e8e8e8; }
        .mouse-btn:active, .mouse-btn.flash { background: #c8d8ee; }
        button { padding: 8px 16px; font-size: 1em; cursor: pointer; }
        .msg { color: #888; font-size: 0.85em; min-height: 1.2em; margin-top: 8px; }
        .err { color: #c00; }
    </style>
</head>
<body>
    <h1>Hydra</h1>

    <table class="status">
        <tr><td>Uptime</td><td id="uptime">-</td></tr>
        <tr><td>IP</td><td id="ip">-</td></tr>
        <tr><td>BT Advertising</td><td id="btadv">-</td></tr>
    </table>

    <h2>BT Centrals</h2>
    <table id="centrals-table" style="width: 100%; border-collapse: collapse; margin: 16px 0;">
        <thead style="background-color: #f0f0f0;">
            <tr>
                <th style="border: 1px solid #ccc; padding: 8px; text-align: left;">ID</th>
                <th style="border: 1px solid #ccc; padding: 8px; text-align: left;">Name</th>
                <th style="border: 1px solid #ccc; padding: 8px; text-align: left;">Address</th>
                <th style="border: 1px solid #ccc; padding: 8px; width: 1%;"></th>
            </tr>
        </thead>
        <tbody id="centrals-body">
            <tr><td colspan="4" style="padding: 8px; text-align: center; color: #888;">No BT centrals connected</td></tr>
        </tbody>
    </table>

    <div class="actions">
        <button onclick="send('reboot')">Reboot</button>
        <button onclick="send('bt_adv_toggle')">Toggle BT Advertising</button>
    </div>

    <div class="control">
        <h2>Mouse</h2>
        <div class="mouse-wrap">
            <div class="mouse-inner">
                <div id="mouse-pad" class="mouse-pad">drag to move &bull; tap to click</div>
                <div class="mouse-btns">
                    <div class="mouse-btn" id="mbtn-left">Left Click</div>
                    <div class="mouse-btn" id="mbtn-mid">Middle</div>
                    <div class="mouse-btn" id="mbtn-right">Right Click</div>
                </div>
            </div>
        </div>
    </div>

    <div class="control">
        <h2>Keyboard</h2>
        <div id="vkbd" class="vkbd"></div>
    </div>

    <div class="msg" id="msg">connecting...</div>

    <script>
    function $(id) { return document.getElementById(id); }

    function fmtUptime(s) {
        if (s < 60) return s + 's';
        if (s < 3600) return Math.floor(s/60) + 'm ' + (s%60) + 's';
        var h = Math.floor(s/3600), m = Math.floor((s%3600)/60);
        return h + 'h ' + m + 'm';
    }

    var ws;

    function wsConnect() {
        ws = new WebSocket('ws://' + location.hostname + ':81/ws');

        ws.onopen = function() {
            $('msg').textContent = '';
            $('msg').className = 'msg';
        };

        ws.onclose = function() {
            $('msg').textContent = 'disconnected, retrying...';
            $('msg').className = 'msg err';
            setTimeout(wsConnect, 2000);
        };

        ws.onerror = function() {
            $('msg').textContent = 'WebSocket error';
            $('msg').className = 'msg err';
        };

        ws.onmessage = function(e) {
            var d = JSON.parse(e.data);
            $('uptime').textContent = fmtUptime(d.uptime);
            $('ip').textContent = d.ip;
            $('btadv').textContent = d.bt_adv ? 'ON' : 'OFF';

            var centrals = d.bt_devices;
            var tbody = $('centrals-body');
            if (!centrals || centrals.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" style="padding: 8px; text-align: center; color: #888;">No BT centrals connected</td></tr>';
            } else {
                tbody.innerHTML = centrals.map(function(c) {
                    var addr = c.addr + (c.addr_type === 'random' ? ' (random)' : '');
                    var actionCell = (c.is_active
                        ? '<span style="color:#2b7a2b; font-size:0.9em;">active</span>'
                        : '<a href="#" onclick="send(\'bt_central_activate\',' + c.id + ');return false;">activate</a>')
                        + ' <a href="#" onclick="if(confirm(\'Unpair?\'))send(\'bt_central_unpair\',' + c.id + ');return false;" style="color:#c00;font-size:0.9em;">unpair</a>';
                    return '<tr style="border:1px solid #ccc;">' +
                        '<td style="border:1px solid #ccc;padding:8px;">' + c.id + '</td>' +
                        '<td style="border:1px solid #ccc;padding:8px;">' + (c.name || '') + '</td>' +
                        '<td style="border:1px solid #ccc;padding:8px;">' + addr + '</td>' +
                        '<td style="border:1px solid #ccc;padding:8px;white-space:nowrap;">' + actionCell + '</td>' +
                        '</tr>';
                }).join('');
            }
        };
    }

    function send(action, value) {
        if (!ws || ws.readyState !== WebSocket.OPEN) {
            $('msg').textContent = 'not connected';
            $('msg').className = 'msg err';
            return;
        }
        var CMD = { bt_adv_toggle:0x03, bt_central_activate:0x04, bt_central_unpair:0x05, reboot:0x07 };
        var b;
        if (action === 'bt_central_activate' || action === 'bt_central_unpair') {
            b = new ArrayBuffer(3);
            var v = new DataView(b);
            v.setUint8(0, CMD[action]);
            v.setUint16(1, value, true);
        } else {
            b = new Uint8Array([CMD[action]]).buffer;
        }
        ws.send(b);
        $('msg').textContent = '';
        $('msg').className = 'msg';
    }

    // ---- Virtual keyboard ----
    // Each key: [width, label, keycode, mod_bit]
    // keycode=-1: spacer  |  keycode=0 + mod>0: sticky modifier toggle
    var KB = [

        [[2,'Esc',0x29],[1,'F1',0x3A],[1,'F2',0x3B],[1,'F3',0x3C],[1,'F4',0x3D],
         [0.5,'',-1],[1,'F5',0x3E],[1,'F6',0x3F],[1,'F7',0x40],[1,'F8',0x41],
         [0.5,'',-1],[1,'F9',0x42],[1,'F10',0x43],[1,'F11',0x44],[1,'F12',0x45]],

        [[1,'`',0x35],[1,'1',0x1E],[1,'2',0x1F],[1,'3',0x20],[1,'4',0x21],[1,'5',0x22],
         [1,'6',0x23],[1,'7',0x24],[1,'8',0x25],[1,'9',0x26],[1,'0',0x27],
         [1,'-',0x2D],[1,'=',0x2E],[2,'Bksp',0x2A]],

        [[1.5,'Tab',0x2B],[1,'Q',0x14],[1,'W',0x1A],[1,'E',0x08],[1,'R',0x15],
         [1,'T',0x17],[1,'Y',0x1C],[1,'U',0x18],[1,'I',0x0C],[1,'O',0x12],
         [1,'P',0x13],[1,'[',0x2F],[1,']',0x30],[1.5,'\\',0x31]],

        [[1.75,'Caps',0x39],[1,'A',0x04],[1,'S',0x16],[1,'D',0x07],[1,'F',0x09],
         [1,'G',0x0A],[1,'H',0x0B],[1,'J',0x0D],[1,'K',0x0E],[1,'L',0x0F],
         [1,';',0x33],[1,"'",0x34],[2.25,'Enter',0x28]],

        [[2,'Shift',0,0x02],[1,'Z',0x1D],[1,'X',0x1B],[1,'C',0x06],[1,'V',0x19],
         [1,'B',0x05],[1,'N',0x11],[1,'M',0x10],[1,',',0x36],[1,'.',0x37],
         [1,'/',0x38],[2,'Shift',0,0x02]],

        [[1.5,'Ctrl',0,0x01],[1.25,'Win',0,0x08],[1.25,'Alt',0,0x04],[5.25,' ',0x2C],
         [1.25,'Alt',0,0x04],[1.25,'Win',0,0x08],[1.5,'Ctrl',0,0x01],
         [1,'&#8592;',0x50],[1,'&#8593;',0x52],[1,'&#8595;',0x51],[1,'&#8594;',0x4F]],

    ];

    var kbdMods = 0;

    function buildKbd() {
        var el = $('vkbd');
        KB.forEach(function(row) {
            var rd = document.createElement('div');
            rd.className = 'kbd-row';
            row.forEach(function(k) {
                var w = k[0], lbl = k[1], kc = k[2], mod = k[3]||0;
                var d = document.createElement('div');
                d.style.cssText = 'flex-grow:' + w + ';flex-basis:0;min-width:0';
                if (kc === -1) {
                    d.className = 'key key-sp';
                } else {
                    d.className = 'key' + (mod ? ' key-mod' : '');
                    d.innerHTML = lbl;
                    if (mod) d.dataset.mod = mod;
                    var fn = (function(kc, mod, d){ return function(){ pressKey(kc, mod, d); }; })(kc, mod, d);
                    d.addEventListener('mousedown', function(e){ e.preventDefault(); fn(); });
                    d.addEventListener('touchstart', function(e){ e.preventDefault(); fn(); }, {passive:false});
                }
                rd.appendChild(d);
            });
            el.appendChild(rd);
        });
    }

    function pressKey(kc, mod, el) {
        if (mod && kc === 0) {
            kbdMods ^= mod;
            document.querySelectorAll('.key-mod').forEach(function(b){
                b.classList.toggle('mod-active', !!(kbdMods & +b.dataset.mod));
            });
            return;
        }
        if (el) { el.classList.add('flash'); setTimeout(function(){ el.classList.remove('flash'); }, 120); }
        if (!ws || ws.readyState !== WebSocket.OPEN) return;
        var m = kbdMods | mod;
        // press: [0x01, modifier, 0x00(reserved), keycode, 0,0,0,0,0]
        var press = new Uint8Array(9); press[0]=0x01; press[1]=m; press[3]=kc;
        // release: all zeros except cmd byte
        var rel = new Uint8Array(9); rel[0]=0x01;
        ws.send(press.buffer);
        ws.send(rel.buffer);
        if (kbdMods) {
            kbdMods = 0;
            document.querySelectorAll('.key-mod').forEach(function(b){ b.classList.remove('mod-active'); });
        }
    }

    function sendMouse(buttons, dx, dy, wheel) {
        if (!ws || ws.readyState !== WebSocket.OPEN) return;
        var buf = new ArrayBuffer(5);
        var v = new DataView(buf);
        v.setUint8(0, 0x02);
        v.setUint8(1, buttons);
        v.setInt8(2, Math.max(-127, Math.min(127, dx)));
        v.setInt8(3, Math.max(-127, Math.min(127, dy)));
        v.setInt8(4, Math.max(-127, Math.min(127, wheel)));
        ws.send(buf);
    }

    function initMousePad() {
        var pad = $('mouse-pad');
        var tracking = false;
        var lastX = 0, lastY = 0;
        var accumX = 0, accumY = 0;
        var tapMoved = false;

        pad.addEventListener('pointerdown', function(e) {
            e.preventDefault();
            pad.setPointerCapture(e.pointerId);
            tracking = true;
            tapMoved = false;
            lastX = e.clientX; lastY = e.clientY;
            accumX = 0; accumY = 0;
            pad.classList.add('tracking');
        });

        pad.addEventListener('pointermove', function(e) {
            if (!tracking) return;
            e.preventDefault();
            var rx = e.clientX - lastX, ry = e.clientY - lastY;
            lastX = e.clientX; lastY = e.clientY;
            if (Math.abs(rx) > 1 || Math.abs(ry) > 1) tapMoved = true;
            accumX += rx; accumY += ry;
            var dx = Math.round(accumX), dy = Math.round(accumY);
            if (dx !== 0 || dy !== 0) {
                sendMouse(0, dx, dy, 0);
                accumX -= dx; accumY -= dy;
            }
        });

        function pointerEnd(e) {
            if (!tracking) return;
            tracking = false;
            pad.classList.remove('tracking');
            if (!tapMoved) {
                // tap = left click
                sendMouse(1, 0, 0, 0);
                setTimeout(function() { sendMouse(0, 0, 0, 0); }, 50);
            }
        }
        pad.addEventListener('pointerup', pointerEnd);
        pad.addEventListener('pointercancel', pointerEnd);

        pad.addEventListener('wheel', function(e) {
            e.preventDefault();
            var delta = e.deltaY > 0 ? -1 : 1;
            sendMouse(0, 0, 0, delta);
        }, {passive: false});

        function setupBtn(id, btnBit) {
            var el = $(id);
            function click(e) {
                e.preventDefault();
                el.classList.add('flash');
                setTimeout(function() { el.classList.remove('flash'); }, 120);
                sendMouse(btnBit, 0, 0, 0);
                setTimeout(function() { sendMouse(0, 0, 0, 0); }, 50);
            }
            el.addEventListener('mousedown', click);
            el.addEventListener('touchstart', click, {passive: false});
        }
        setupBtn('mbtn-left', 1);
        setupBtn('mbtn-mid', 4);
        setupBtn('mbtn-right', 2);
    }

    wsConnect();
    buildKbd();
    initMousePad();
    </script>
</body>
</html>
