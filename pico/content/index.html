<html>
<head>
    <title>Hydra</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: sans-serif; max-width: 1000px; margin: 20px auto; padding: 0 10px; }
        h1 { margin-bottom: 4px; }
        .status td { padding: 4px 12px 4px 0; }
        .status td:first-child { font-weight: bold; }
        .actions { display: flex; gap: 8px; flex-wrap: wrap; margin: 16px 0; }
        .control { margin: 20px 0; }
        .mouse-pad { width: 100%; height: 220px; margin: 0 auto; background: #f0f0f0; border: 2px solid #bbb; border-radius: 8px; cursor: crosshair; touch-action: none; user-select: none; box-sizing: border-box; display: flex; align-items: center; justify-content: center; color: #aaa; font-size: 0.85em; outline: none; text-align: center; padding: 12px; }
        .mouse-pad.active { background: #e8eef5; border-color: #4a90d9; color: #7aaad9; }
        button { padding: 8px 16px; font-size: 1em; cursor: pointer; }
        .msg { color: #888; font-size: 0.85em; min-height: 1.2em; margin-top: 8px; }
        .err { color: #c00; }
    </style>
</head>
<body>
    <h1>Hydra</h1>

    <table class="status">
        <tr><td>Uptime</td><td id="uptime">-</td></tr>
        <tr><td>IP</td><td id="ip">-</td></tr>
        <tr><td>BT Advertising</td><td id="btadv">-</td></tr>
    </table>

    <h2>BT Centrals</h2>
    <table id="centrals-table" style="width: 100%; border-collapse: collapse; margin: 16px 0;">
        <thead style="background-color: #f0f0f0;">
            <tr>
                <th style="border: 1px solid #ccc; padding: 8px; text-align: left;">ID</th>
                <th style="border: 1px solid #ccc; padding: 8px; text-align: left;">Name</th>
                <th style="border: 1px solid #ccc; padding: 8px; text-align: left;">Address</th>
                <th style="border: 1px solid #ccc; padding: 8px; width: 1%;"></th>
            </tr>
        </thead>
        <tbody id="centrals-body">
            <tr><td colspan="4" style="padding: 8px; text-align: center; color: #888;">No BT centrals connected</td></tr>
        </tbody>
    </table>

    <div class="actions">
        <button onclick="send('reboot')">Reboot</button>
        <button onclick="send('bt_adv_toggle')">Toggle BT Advertising</button>
    </div>

    <div class="control">
        <h2>Mouse &amp; Keyboard</h2>
        <div id="mouse-pad" class="mouse-pad" tabindex="0">hover to control cursor &bull; left-click to lock capture (Esc to unlock) &bull; left/middle/right/back/forward + wheel + keys while active</div>
    </div>

    <div class="msg" id="msg">connecting...</div>

    <script>
    function $(id) { return document.getElementById(id); }

    function fmtUptime(s) {
        if (s < 60) return s + 's';
        if (s < 3600) return Math.floor(s/60) + 'm ' + (s%60) + 's';
        var h = Math.floor(s/3600), m = Math.floor((s%3600)/60);
        return h + 'h ' + m + 'm';
    }

    var ws;

    function wsConnect() {
        ws = new WebSocket('ws://' + location.hostname + ':81/ws');

        ws.onopen = function() {
            $('msg').textContent = '';
            $('msg').className = 'msg';
        };

        ws.onclose = function() {
            $('msg').textContent = 'disconnected, retrying...';
            $('msg').className = 'msg err';
            setTimeout(wsConnect, 2000);
        };

        ws.onerror = function() {
            $('msg').textContent = 'WebSocket error';
            $('msg').className = 'msg err';
        };

        ws.onmessage = function(e) {
            var d = JSON.parse(e.data);
            $('uptime').textContent = fmtUptime(d.uptime);
            $('ip').textContent = d.ip;
            $('btadv').textContent = d.bt_adv ? 'ON' : 'OFF';

            var centrals = d.bt_devices;
            var tbody = $('centrals-body');
            if (!centrals || centrals.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" style="padding: 8px; text-align: center; color: #888;">No BT centrals connected</td></tr>';
            } else {
                tbody.innerHTML = centrals.map(function(c) {
                    var addr = c.addr + (c.addr_type === 'random' ? ' (random)' : '');
                    var actionCell = (c.is_active
                        ? '<span style="color:#2b7a2b; font-size:0.9em;">active</span>'
                        : '<a href="#" onclick="send(\'bt_central_activate\',' + c.id + ');return false;">activate</a>')
                        + ' <a href="#" onclick="if(confirm(\'Unpair?\'))send(\'bt_central_unpair\',' + c.id + ');return false;" style="color:#c00;font-size:0.9em;">unpair</a>';
                    return '<tr style="border:1px solid #ccc;">' +
                        '<td style="border:1px solid #ccc;padding:8px;">' + c.id + '</td>' +
                        '<td style="border:1px solid #ccc;padding:8px;">' + (c.name || '') + '</td>' +
                        '<td style="border:1px solid #ccc;padding:8px;">' + addr + '</td>' +
                        '<td style="border:1px solid #ccc;padding:8px;white-space:nowrap;">' + actionCell + '</td>' +
                        '</tr>';
                }).join('');
            }
        };
    }

    function send(action, value) {
        if (!ws || ws.readyState !== WebSocket.OPEN) {
            $('msg').textContent = 'not connected';
            $('msg').className = 'msg err';
            return;
        }
        var CMD = { bt_adv_toggle:0x03, bt_central_activate:0x04, bt_central_unpair:0x05, reboot:0x07 };
        var b;
        if (action === 'bt_central_activate' || action === 'bt_central_unpair') {
            b = new ArrayBuffer(3);
            var v = new DataView(b);
            v.setUint8(0, CMD[action]);
            v.setUint16(1, value, true);
        } else {
            b = new Uint8Array([CMD[action]]).buffer;
        }
        ws.send(b);
        $('msg').textContent = '';
        $('msg').className = 'msg';
    }

    function sendMouse(buttons, dx, dy, wheel) {
        if (!ws || ws.readyState !== WebSocket.OPEN) return;
        var buf = new ArrayBuffer(5);
        var v = new DataView(buf);
        v.setUint8(0, 0x02);
        v.setUint8(1, buttons);
        v.setInt8(2, Math.max(-127, Math.min(127, dx)));
        v.setInt8(3, Math.max(-127, Math.min(127, dy)));
        v.setInt8(4, Math.max(-127, Math.min(127, wheel)));
        ws.send(buf);
    }

    function initMousePad() {
        var pad = $('mouse-pad');
        var overPad = false;

        var pointerLocked = false;

        function isActiveCapture() {
            return overPad || pointerLocked;
        }

        function updatePadActive() {
            pad.classList.toggle('active', isActiveCapture() || touchTracking);
        }

        // --- Desktop: hover to move / pointer lock ---
        pad.addEventListener('mouseenter', function() {
            overPad = true;
            updatePadActive();
        });
        pad.addEventListener('mouseleave', function() {
            overPad = false;
            updatePadActive();
        });

        document.addEventListener('pointerlockchange', function() {
            pointerLocked = document.pointerLockElement === pad;
            updatePadActive();
        });

        function sendMove(dx, dy) {
            if (!isActiveCapture()) return;
            if (dx !== 0 || dy !== 0) sendMouse(0, dx, dy, 0);
        }

        pad.addEventListener('mousemove', function(e) {
            if (pointerLocked) return;
            sendMove(e.movementX, e.movementY);
        });

        document.addEventListener('mousemove', function(e) {
            if (!pointerLocked) return;
            sendMove(e.movementX, e.movementY);
        });

        // --- Touch: drag to move ---
        var touchTracking = false;
        var lastTX = 0, lastTY = 0;
        var touchMoved = false;
        var accumX = 0, accumY = 0;

        pad.addEventListener('pointerdown', function(e) {
            if (e.pointerType === 'mouse') return;
            e.preventDefault();
            pad.setPointerCapture(e.pointerId);
            touchTracking = true;
            touchMoved = false;
            lastTX = e.clientX; lastTY = e.clientY;
            accumX = 0; accumY = 0;
            updatePadActive();
        });
        pad.addEventListener('pointermove', function(e) {
            if (e.pointerType === 'mouse' || !touchTracking) return;
            e.preventDefault();
            var rx = e.clientX - lastTX, ry = e.clientY - lastTY;
            lastTX = e.clientX; lastTY = e.clientY;
            if (Math.abs(rx) > 1 || Math.abs(ry) > 1) touchMoved = true;
            accumX += rx; accumY += ry;
            var dx = Math.round(accumX), dy = Math.round(accumY);
            if (dx !== 0 || dy !== 0) {
                sendMouse(0, dx, dy, 0);
                accumX -= dx; accumY -= dy;
            }
        });
        function touchEnd(e) {
            if (e.pointerType === 'mouse' || !touchTracking) return;
            touchTracking = false;
            updatePadActive();
            if (!touchMoved) {
                sendMouse(1, 0, 0, 0);
                setTimeout(function() { sendMouse(0, 0, 0, 0); }, 50);
            }
        }
        pad.addEventListener('pointerup', touchEnd);
        pad.addEventListener('pointercancel', touchEnd);

        // --- Desktop button clicks (left/middle/right) ---
        function buttonToBit(button) {
            if (button === 0) return 1; // left
            if (button === 1) return 4; // middle
            if (button === 2) return 2; // right
            if (button === 3) return 8; // back (X1)
            if (button === 4) return 16; // forward (X2)
            return 0;
        }

        pad.addEventListener('contextmenu', function(e) {
            e.preventDefault();
        });

        pad.addEventListener('auxclick', function(e) {
            e.preventDefault();
        });

        function requestLock() {
            if (pointerLocked || !pad.requestPointerLock) return;
            try { pad.requestPointerLock(); } catch (_) {}
        }

        pad.addEventListener('mousedown', function(e) {
            if (pointerLocked) return;
            var bit = buttonToBit(e.button);
            if (!bit) return;
            e.preventDefault();
            if (e.button === 0) requestLock();
            sendMouse(bit, 0, 0, 0);
        });

        pad.addEventListener('mouseup', function(e) {
            if (pointerLocked) return;
            var bit = buttonToBit(e.button);
            if (!bit) return;
            e.preventDefault();
            sendMouse(0, 0, 0, 0);
        });

        document.addEventListener('mousedown', function(e) {
            if (!pointerLocked) return;
            var bit = buttonToBit(e.button);
            if (!bit) return;
            e.preventDefault();
            sendMouse(bit, 0, 0, 0);
        });

        document.addEventListener('mouseup', function(e) {
            if (!pointerLocked) return;
            var bit = buttonToBit(e.button);
            if (!bit) return;
            e.preventDefault();
            sendMouse(0, 0, 0, 0);
        });

        document.addEventListener('contextmenu', function(e) {
            if (!pointerLocked) return;
            e.preventDefault();
        });

        document.addEventListener('auxclick', function(e) {
            if (!pointerLocked) return;
            e.preventDefault();
        });

        // --- Scroll wheel ---
        pad.addEventListener('wheel', function(e) {
            e.preventDefault();
            var delta = e.deltaY > 0 ? -1 : 1;
            sendMouse(0, 0, 0, delta);
        }, {passive: false});

        document.addEventListener('wheel', function(e) {
            if (!pointerLocked) return;
            e.preventDefault();
            var delta = e.deltaY > 0 ? -1 : 1;
            sendMouse(0, 0, 0, delta);
        }, {passive: false});

        // --- Keyboard: capture while mouse is over pad ---
        document.addEventListener('keydown', function(e) {
            if (!isActiveCapture()) return;

            if (pointerLocked && e.code === 'Escape') {
                e.preventDefault();
                if (document.exitPointerLock) document.exitPointerLock();
                return;
            }

            var kc = domKeyToHid(e.code);
            if (kc === 0) return;
            e.preventDefault();
            var mod = getModifiers();
            var press = new Uint8Array(9); press[0]=0x01; press[1]=mod; press[3]=kc;
            var rel   = new Uint8Array(9); rel[0]=0x01;
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(press.buffer);
                ws.send(rel.buffer);
            }
        });

    }

    // Map DOM KeyboardEvent.code to HID usage IDs
    var HID_MAP = {
        'KeyA':0x04,'KeyB':0x05,'KeyC':0x06,'KeyD':0x07,'KeyE':0x08,'KeyF':0x09,
        'KeyG':0x0A,'KeyH':0x0B,'KeyI':0x0C,'KeyJ':0x0D,'KeyK':0x0E,'KeyL':0x0F,
        'KeyM':0x10,'KeyN':0x11,'KeyO':0x12,'KeyP':0x13,'KeyQ':0x14,'KeyR':0x15,
        'KeyS':0x16,'KeyT':0x17,'KeyU':0x18,'KeyV':0x19,'KeyW':0x1A,'KeyX':0x1B,
        'KeyY':0x1C,'KeyZ':0x1D,
        'Digit1':0x1E,'Digit2':0x1F,'Digit3':0x20,'Digit4':0x21,'Digit5':0x22,
        'Digit6':0x23,'Digit7':0x24,'Digit8':0x25,'Digit9':0x26,'Digit0':0x27,
        'Enter':0x28,'Escape':0x29,'Backspace':0x2A,'Tab':0x2B,'Space':0x2C,
        'Minus':0x2D,'Equal':0x2E,'BracketLeft':0x2F,'BracketRight':0x30,
        'Backslash':0x31,'Semicolon':0x33,'Quote':0x34,'Backquote':0x35,
        'Comma':0x36,'Period':0x37,'Slash':0x38,'CapsLock':0x39,
        'F1':0x3A,'F2':0x3B,'F3':0x3C,'F4':0x3D,'F5':0x3E,'F6':0x3F,
        'F7':0x40,'F8':0x41,'F9':0x42,'F10':0x43,'F11':0x44,'F12':0x45,
        'PrintScreen':0x46,'ScrollLock':0x47,'Pause':0x48,
        'Insert':0x49,'Home':0x4A,'PageUp':0x4B,'Delete':0x4C,'End':0x4D,'PageDown':0x4E,
        'ArrowRight':0x4F,'ArrowLeft':0x50,'ArrowDown':0x51,'ArrowUp':0x52,
        'NumLock':0x53,
        'Numpad0':0x62,'Numpad1':0x59,'Numpad2':0x5A,'Numpad3':0x5B,
        'Numpad4':0x5C,'Numpad5':0x5D,'Numpad6':0x5E,'Numpad7':0x5F,
        'Numpad8':0x60,'Numpad9':0x61,'NumpadDecimal':0x63,
        'NumpadDivide':0x54,'NumpadMultiply':0x55,'NumpadSubtract':0x56,
        'NumpadAdd':0x57,'NumpadEnter':0x58,
        'ShiftLeft':0xE1,'ShiftRight':0xE5,
        'ControlLeft':0xE0,'ControlRight':0xE4,
        'AltLeft':0xE2,'AltRight':0xE6,
        'MetaLeft':0xE3,'MetaRight':0xE7,
    };

    var MOD_CODES = {
        'ControlLeft':0x01,'ControlRight':0x10,'ShiftLeft':0x02,'ShiftRight':0x20,
        'AltLeft':0x04,'AltRight':0x40,'MetaLeft':0x08,'MetaRight':0x80
    };
    var heldModifiers = {};

    document.addEventListener('keydown', function(e) { if (e.code in MOD_CODES) heldModifiers[e.code] = true; });
    document.addEventListener('keyup',   function(e) { if (e.code in MOD_CODES) delete heldModifiers[e.code]; });

    function getModifiers() {
        var m = 0;
        for (var c in heldModifiers) m |= MOD_CODES[c];
        return m;
    }

    function domKeyToHid(code) {
        return HID_MAP[code] || 0;
    }

    wsConnect();
    initMousePad();
    </script>
</body>
</html>
